<section id="top" class="hero wrap">
  <div class="hero-grid">
    <div class="hero-text">
      <p class="eyebrow">{{ .Site.Params.field }} &middot; {{ .Site.Params.institution }}</p>
      <h1>{{ .Site.Params.name }}</h1>
      <p class="hero-bio">
        I am a PhD candidate in Economics at the {{ .Site.Params.institution }}, working on international macroeconomics.
      </p>
      <p class="hero-links">
        <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
        <span class="sep">&middot;</span>
        <a href="{{ .Site.Params.cv_file }}">Download CV</a>
      </p>
    </div>
    <div class="hero-photo">
      <div class="photo-frame">
        <img src="/img/headshot.jpg" alt="Joseph Lansley">
      </div>
    </div>
  </div>
</section>
