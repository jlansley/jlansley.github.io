<section id="top" class="hero wrap">
  <div class="hero-grid">
    <div class="hero-text">
      <p class="eyebrow">{{ .Site.Params.field }} &middot; {{ .Site.Params.institution }}</p>
      <h1>{{ .Site.Params.name }}</h1>
      <p class="hero-bio">
        I am a PhD candidate in Economics at the {{ .Site.Params.institution }}, working on
        international macroeconomics.
      </p>
      <div class="hero-links">
        <a class="pill" href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
        <a class="pill pill-primary" href="{{ .Site.Params.cv_file }}">CV (PDF)</a>
      </div>
    </div>
    <div class="hero-photo">
      <div class="photo-frame">
        <img src="placeholder" alt="Joseph Lansley">
      </div>
    </div>
  </div>
</section>
