<section id="teaching" class="section wrap">
  <p class="eyebrow">Teaching</p>
  <h2>Courses</h2>
  <div class="teaching-list">
    {{ range .Site.Data.teaching }}
    <div class="teaching-row">
      <div>
        <p class="teaching-course">{{ .course }}</p>
        <p class="teaching-term">{{ .role }} &middot; {{ .term }}</p>
      </div>
      {{ if .evals }}<span class="tag">{{ .evals }}</span>{{ end }}
    </div>
    {{ end }}
  </div>
</section>
